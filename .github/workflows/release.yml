name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        run: python -m build

      - name: Upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
        # 注意：需要配置PYPI_API_TOKEN secret

      - name: Upload Python artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

  release-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundle: appimage
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: msi
          - os: macos-latest
            target: x86_64-apple-darwin
            bundle: dmg
          - os: macos-latest
            target: aarch64-apple-darwin
            bundle: dmg
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: |
          cd desktop
          npm install

      - name: Build Tauri
        run: |
          cd desktop
          npm run tauri:build -- --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          path: desktop/src-tauri/target/${{ matrix.target }}/release/bundle/*

  create-release:
    needs: [release-python, release-desktop]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Python artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-x86_64-unknown-linux-gnu
          path: desktop-artifacts/linux/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-x86_64-pc-windows-msvc
          path: desktop-artifacts/windows/

      - name: Download macOS x86_64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-x86_64-apple-darwin
          path: desktop-artifacts/macos-x86_64/

      - name: Download macOS aarch64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: desktop-aarch64-apple-darwin
          path: desktop-artifacts/macos-aarch64/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            desktop-artifacts/**/*
          generate_release_notes: true
