name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libffi-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev,api,smart]"

      - name: Run tests with coverage
        run: pytest -v --cov=src/vector_studio --cov-report=xml --cov-report=term

      - name: Run API and core tests
        run: pytest -v tests/test_api.py tests/test_api_client.py tests/test_plugins.py tests/test_config.py

      - name: Run AI and preview tests
        run: pytest -v tests/test_ai_simplify.py tests/test_ai_ocr.py tests/test_live_preview.py tests/test_region_trace.py tests/test_market.py

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: Check code style with ruff
        run: |
          ruff check src tests
          ruff format --check src tests

      - name: Verify Docker build
        run: docker build --target runtime -t bitmap-vector-studio:test .

  desktop-build-test:
    name: Desktop Build Test
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-action@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install
        working-directory: desktop

      - name: Build frontend
        run: npm run build
        working-directory: desktop

      - name: Check Tauri (cargo check)
        run: cargo check
        working-directory: desktop/src-tauri
